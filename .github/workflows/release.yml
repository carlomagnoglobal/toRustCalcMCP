name: Release

on:
  push:
    tags:
      - v*

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          tar czf rcalc-linux-x86_64.tar.gz -C target/release toRustCalcMCP rcalc rcalc-web
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./rcalc-linux-x86_64.tar.gz
          asset_name: rcalc-linux-x86_64.tar.gz
          asset_content_type: application/gzip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          mkdir -p rcalc-${{ matrix.target }}/bin
          cp target/${{ matrix.target }}/release/toRustCalcMCP rcalc-${{ matrix.target }}/bin/
          cp target/${{ matrix.target }}/release/rcalc rcalc-${{ matrix.target }}/bin/
          cp target/${{ matrix.target }}/release/rcalc-web rcalc-${{ matrix.target }}/bin/
          tar czf rcalc-${{ matrix.target }}.tar.gz rcalc-${{ matrix.target }}/
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./rcalc-${{ matrix.target }}.tar.gz
          asset_name: rcalc-${{ matrix.target }}.tar.gz
          asset_content_type: application/gzip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          powershell -Command "Compress-Archive -Path target/release/toRustCalcMCP.exe, target/release/rcalc.exe, target/release/rcalc-web.exe -DestinationPath rcalc-windows-x86_64.zip"
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./rcalc-windows-x86_64.zip
          asset_name: rcalc-windows-x86_64.zip
          asset_content_type: application/zip
