name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          tar czf rcalc-linux-x86_64.tar.gz -C target/release toRustCalcMCP rcalc rcalc-web
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rcalc-linux-x86_64
          path: rcalc-linux-x86_64.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          mkdir -p rcalc-${{ matrix.target }}/bin
          cp target/${{ matrix.target }}/release/toRustCalcMCP rcalc-${{ matrix.target }}/bin/
          cp target/${{ matrix.target }}/release/rcalc rcalc-${{ matrix.target }}/bin/
          cp target/${{ matrix.target }}/release/rcalc-web rcalc-${{ matrix.target }}/bin/
          tar czf rcalc-${{ matrix.target }}.tar.gz rcalc-${{ matrix.target }}/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rcalc-${{ matrix.target }}
          path: rcalc-${{ matrix.target }}.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin toRustCalcMCP --bin rcalc --bin rcalc-web
      - name: Package
        run: |
          powershell -Command "Compress-Archive -Path target/release/toRustCalcMCP.exe, target/release/rcalc.exe, target/release/rcalc-web.exe -DestinationPath rcalc-windows-x86_64.zip"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rcalc-windows-x86_64
          path: rcalc-windows-x86_64.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rcalc-linux-x86_64/rcalc-linux-x86_64.tar.gz
            artifacts/rcalc-x86_64-apple-darwin/rcalc-x86_64-apple-darwin.tar.gz
            artifacts/rcalc-aarch64-apple-darwin/rcalc-aarch64-apple-darwin.tar.gz
            artifacts/rcalc-windows-x86_64/rcalc-windows-x86_64.zip

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/carlomagnoglobal/torustcalcmcp
            docker.io/carlomagnoglobal/torustcalcmcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/carlomagnoglobal/torustcalcmcp:buildcache
          cache-to: type=registry,ref=ghcr.io/carlomagnoglobal/torustcalcmcp:buildcache,mode=max
